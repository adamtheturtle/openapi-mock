repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyroma
        name: pyroma
        entry: pyroma --min 10 .
        language: python
        pass_filenames: false
        additional_dependencies: [pyroma]
