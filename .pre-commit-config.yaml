ci:
  skip:
    - pyright-verifytypes
    - pyright-docs

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char
      - id: rst-backticks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/regebro/pyroma
    rev: "5.0.1"
    hooks:
      - id: pyroma
        args: ["--min=10", "."]
  - repo: local
    hooks:
      - id: pyright-verifytypes
        name: pyright verifytypes
        entry: uv run --extra=dev -m pyright --ignoreexternal --verifytypes openapi_mock
        language: python
        pass_filenames: false
        additional_dependencies: [uv==0.9.5]

      - id: pyright-docs
        name: pyright-docs
        entry: uv run --extra=dev doccmd --no-write-to-file --example-workers 0 --language=python --command="pyright"
        language: python
        types_or: [markdown, rst]
        additional_dependencies: [uv==0.9.5]

      - id: linkcheck
        name: linkcheck
        entry: uv run --extra=dev sphinx-build -M linkcheck docs/source docs/build -W
        language: python
        types_or: [rst]
        stages: [manual]
        pass_filenames: false
        additional_dependencies: [uv==0.9.5]

      - id: spelling
        name: spelling
        entry: uv run --extra=dev sphinx-build -M spelling docs/source docs/build -W
        language: python
        types_or: [rst]
        stages: [manual]
        pass_filenames: false
        additional_dependencies: [uv==0.9.5]

      - id: docs
        name: Build Documentation
        entry: uv run --extra=dev sphinx-build -M html docs/source docs/build -W
        language: python
        types_or: [rst]
        stages: [manual]
        pass_filenames: false
        additional_dependencies: [uv==0.9.5]
